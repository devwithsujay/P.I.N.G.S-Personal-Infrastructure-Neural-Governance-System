services:
  pings-core:
    build:
      context: .
      dockerfile: core/Dockerfile
    container_name: pings-core
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - pings-data:/app/data
      - pings-workspace:/app/workspace
      - ./persona:/app/persona
    networks:
      - pings-net
    depends_on:
      pings-chroma:
        condition: service_healthy
      pings-searxng:
        condition: service_healthy
      pings-opencode:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    restart: unless-stopped

  pings-opencode:
    build:
      context: ./opencode-sidecar
      dockerfile: Dockerfile
    container_name: pings-opencode
    env_file:
      - .env
    networks:
      - pings-net
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:4096/global/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  pings-bot:
    build:
      context: ./bot
      dockerfile: Dockerfile
    container_name: pings-bot
    env_file:
      - .env
    environment:
      - PINGS_CORE_URL=http://pings-core:8000
    networks:
      - pings-net
    depends_on:
      pings-core:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"print('ok')\""]
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  pings-web:
    build:
      context: ./web
      dockerfile: Dockerfile
    container_name: pings-web
    networks:
      - pings-net
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:80/"]
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  pings-nginx:
    image: nginx:alpine
    container_name: pings-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    networks:
      - pings-net
    depends_on:
      - pings-core
      - pings-web
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:80/"]
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  pings-chroma:
    image: chromadb/chroma:0.5.23
    container_name: pings-chroma
    ports:
      - "8100:8000"
    volumes:
      - pings-chroma-data:/chroma/chroma
    networks:
      - pings-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/heartbeat"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  pings-searxng:
    image: searxng/searxng:latest
    container_name: pings-searxng
    ports:
      - "8081:8080"
    volumes:
      - ./searxng/settings.yml:/etc/searxng/settings.yml:ro
    networks:
      - pings-net
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  pings-ntfy:
    image: binwiederhier/ntfy:v2
    container_name: pings-ntfy
    command: serve
    ports:
      - "8090:80"
    volumes:
      - pings-ntfy-cache:/var/cache/ntfy
      - pings-ntfy-config:/etc/ntfy
    environment:
      - NTFY_BASE_URL=http://pings-ntfy:80
    networks:
      - pings-net
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:80/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

volumes:
  pings-data:
  pings-chroma-data:
  pings-workspace:
  pings-ntfy-cache:
  pings-ntfy-config:

networks:
  pings-net:
    driver: bridge
